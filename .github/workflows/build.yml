name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: beevelop/cordova:latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pip3
        run: apt-get update && apt-get install -y python3-pip
      
      - name: Generate icons
        run: |
          pip3 install pillow -q
          python3 -c "
          from PIL import Image, ImageDraw
          import os
          os.makedirs('res/icon/android', exist_ok=True)
          sizes = {'ldpi':36,'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for n,s in sizes.items():
              img = Image.new('RGBA',(s,s),(27,42,74,255))
              draw = ImageDraw.Draw(img)
              draw.rectangle([0,0,s-1,s-1], outline=(217,137,30,255), width=max(1,s//20))
              img.save(f'res/icon/android/{n}.png')
          print('Icons OK')
          "
      
      - name: Install dependencies
        run: npm install
      
      - name: Add Android platform
        run: cordova platform add android@13.0.0
      
      - name: Build debug APK
        run: cordova build android --debug
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-mobile-money-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
