name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        
      - name: Generate icons
        run: |
          pip install pillow -q
          python3 -c "
          from PIL import Image
          import os
          os.makedirs('res/icon/android', exist_ok=True)
          sizes = {'ldpi':36,'mdpi':48,'hdpi':72,'xhdpi':96,'xxhdpi':144,'xxxhdpi':192}
          for n,s in sizes.items():
              Image.new('RGBA',(s,s),(27,42,74,255)).save(f'res/icon/android/{n}.png')
          print('Icons OK')
          "
          
      - name: Install Cordova
        run: npm install -g cordova
        
      - name: Install dependencies
        run: npm install
        
      - name: Add Android platform
        run: cordova platform add android@12.0.1
        
      - name: Build debug APK
        run: cordova build android --debug
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agent-mobile-money-apk
          path: platforms/android/app/build/outputs/apk/debug/app-debug.apk
